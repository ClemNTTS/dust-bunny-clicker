name: CI/CD Release

on:
  push:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild (Generate Native Android)
        run: npx expo prebuild --platform android --no-install

      - name: Debug Settings Gradle
        run: cat android/settings.gradle

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          export NODE_BINARY=$(which node)
          ./gradlew assembleRelease --no-daemon
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Get Version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}-${{ github.run_number }}
          name: Release v${{ steps.package-version.outputs.version }} (Build #${{ github.run_number }})
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
